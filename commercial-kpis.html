<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FrontlineQSR | KPIs</title>
  <link rel="stylesheet" href="./assets/styles.css" />
  <meta name="robots" content="noindex" />

  <script type="module">
    import { bootCommercialPage } from "./assets/commercial-page-boot.js";

    bootCommercialPage({
      allowRoles: ["sm","dm","rm","vp","owner","admin","super_admin"],
      requireOrg: false
    });
  </script>
</head>

<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">FrontlineQSR</div>

      <nav class="nav">
        <a class="nav-link" data-nav="./commercial-portal.html">Portal</a>
        <a class="nav-link" data-nav="./commercial-shift-insight.html">Shift Insight</a>
        <a class="nav-link" data-nav="./commercial-action-plan.html">Action Plan</a>
        <a class="nav-link active" data-nav="./commercial-kpis.html">KPIs</a>
        <a class="nav-link" data-nav="./commercial-progress.html">Progress</a>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-title">
          <h1>KPIs</h1>
          <p>Approved baseline and weekly performance for the selected store.</p>
          <p id="kpiContext" style="margin-top:6px;"></p>
          <p id="kpiScope" style="margin-top:4px;"></p>
        </div>

        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;min-width:220px;">
          <select id="viewSelector" class="input" style="min-width:180px;">
            <option value="sm" selected>Store View</option>
            <option value="dm">District View</option>
            <option value="rm">Region View</option>
            <option value="vp">Executive View</option>
          </select>
          <button class="btn" id="logoutBtn" type="button">Logout</button>
        </div>
      </header>

      <section class="panel">
        <div id="commercialKpisRoot"></div>
      </section>
    </main>
  </div>

  <script type="module" src="./assets/commercial-kpis.js?v=1"></script>

  <script>
    function getScopedParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        org: String(params.get("org") || "").trim(),
        store: String(params.get("store") || "").trim(),
        district: String(params.get("district") || "").trim(),
        region: String(params.get("region") || "").trim()
      };
    }

    function buildScopedLink(path) {
      const p = getScopedParams();
      const url = new URL(path, window.location.href);

      if (p.org) url.searchParams.set("org", p.org);
      if (p.store) url.searchParams.set("store", p.store);
      if (p.district) url.searchParams.set("district", p.district);
      if (p.region) url.searchParams.set("region", p.region);

      return url.toString();
    }

    document.addEventListener("DOMContentLoaded", () => {
      document.querySelectorAll("[data-nav]").forEach((link) => {
        const path = link.getAttribute("data-nav");
        if (!path) return;
        link.setAttribute("href", buildScopedLink(path));
      });
    });
  </script>
</body>
</html>
