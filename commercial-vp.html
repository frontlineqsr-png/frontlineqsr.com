<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FrontlineQSR | Commercial VP</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <meta name="robots" content="noindex" />

  <style>
    :root{
      --bg-1:#0b1220;
      --bg-2:#0a1020;
      --bg-3:#070b14;
      --card-bg:rgba(255,255,255,.95);
      --card-border:rgba(15,23,42,.12);
      --text:#0f172a;
      --muted:rgba(15,23,42,.74);
      --line:rgba(15,23,42,.10);
      --shadow:0 18px 50px rgba(0,0,0,.35);
      --radius:16px;
      --brand-glow:rgba(80,200,255,.18);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      color:#fff;
      background:
        radial-gradient(1200px 700px at 50% 0%, rgba(255,255,255,0.10), rgba(0,0,0,0) 60%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 55%, var(--bg-3) 100%);
      font-family: Georgia, "Times New Roman", serif;
    }

    .page{ min-height:100vh; }
    .hero{ padding:28px 16px 56px; }
    .shell{ max-width:1160px; margin:0 auto; }

    .brand-bar{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      margin-bottom:18px;
      padding:12px 16px;
      border-radius:14px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 10px 30px rgba(0,0,0,.20);
      backdrop-filter:blur(6px);
    }

    .brand-mark{
      width:48px;
      height:48px;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      background:rgba(255,255,255,.10);
      box-shadow:0 0 24px var(--brand-glow);
      flex:0 0 auto;
    }

    .brand-mark img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .brand-copy{
      min-width:0;
    }

    .brand-title{
      margin:0;
      font-size:18px;
      font-weight:800;
      letter-spacing:.2px;
      color:#fff;
      line-height:1.1;
    }

    .brand-sub{
      margin:3px 0 0;
      font-size:12px;
      line-height:1.3;
      color:rgba(255,255,255,.76);
      letter-spacing:.2px;
    }

    .anchor{
      text-align:center;
      letter-spacing:.2px;
      font-weight:800;
      opacity:.86;
      margin:0 0 14px;
      font-size:13px;
    }

    .page-card{
      margin:0 auto;
      padding:24px;
      border-radius:var(--radius);
      background:var(--card-bg);
      border:1px solid var(--card-border);
      box-shadow:var(--shadow);
      color:var(--text);
    }

    .header-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
    }

    .title{
      margin:0 0 10px 0;
      font-weight:900;
      font-size:30px;
      line-height:1.1;
    }

    .sub{
      margin:0;
      color:var(--muted);
      line-height:1.5;
      font-size:15px;
    }

    .status-wrap{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:14px;
    }

    .status-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(15,23,42,.06);
      border:1px solid rgba(15,23,42,.08);
      color:var(--muted);
      font-size:13px;
      font-weight:700;
    }

    .status-dot{
      width:8px;
      height:8px;
      border-radius:999px;
      background:#22c55e;
      flex:0 0 auto;
    }

    .hr{
      height:1px;
      background:var(--line);
      border:0;
      margin:18px 0;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .btnx{
      padding:12px 16px;
      border-radius:12px;
      border:1px solid rgba(15,23,42,.12);
      background:#111827;
      color:#fff;
      cursor:pointer;
      font-weight:800;
      font-size:14px;
      text-decoration:none;
      transition:.15s ease;
    }

    .btnx:hover{
      background:#0f172a;
    }

    .btnx.secondary{
      background:#fff;
      color:#111827;
    }

    .btnx.secondary:hover{
      background:#f8fafc;
    }

    .view-select{
      min-width:220px;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid rgba(15,23,42,.12);
      background:#fff;
      color:#111827;
      font-weight:800;
      font-size:14px;
      outline:none;
      cursor:pointer;
    }

    .view-select:focus{
      border-color:rgba(15,23,42,.28);
      box-shadow:0 0 0 3px rgba(15,23,42,.08);
    }

    @media (max-width: 640px){
      .hero{ padding:22px 14px 44px; }
      .brand-bar{ justify-content:flex-start; }
      .page-card{ padding:20px; }
      .title{ font-size:26px; }
      .header-row{ flex-direction:column; }
      .actions{ width:100%; }
      .actions .btnx,
      .actions .view-select{
        width:100%;
        box-sizing:border-box;
        text-align:center;
      }
    }
  </style>

  <script type="module">
    import { bootCommercialPage } from "./assets/commercial-page-boot.js";

    bootCommercialPage({
      allowRoles: ["vp","owner","admin","super_admin"],
      requireOrg: true
    });
  </script>
</head>

<body>
  <main class="page">
    <section class="hero">
      <div class="shell">
        <div class="brand-bar">
          <div class="brand-mark">
            <img src="assets/restaurant-excellence-system.png" alt="Restaurant Excellence System logo" onerror="this.style.display='none'; this.parentElement.textContent='R'; this.parentElement.style.fontWeight='900'; this.parentElement.style.fontSize='18px';" />
          </div>
          <div class="brand-copy">
            <p class="brand-title">Restaurant Excellence System™</p>
            <p class="brand-sub">Powered by FrontlineQSR — Commercial leadership workspace</p>
          </div>
        </div>

        <p class="anchor">Commercial — VP / Owner</p>

        <div class="page-card">
          <div class="header-row">
            <div>
              <h2 class="title">Executive Dashboard</h2>
              <p id="sessionInfo" class="sub">Loading session…</p>
              <p id="vpContext" class="sub" style="margin-top:8px;"></p>

              <div class="status-wrap">
                <div class="status-pill">
                  <span class="status-dot"></span>
                  Executive access active
                </div>
                <div class="status-pill">Enterprise Scope</div>
                <div class="status-pill">Readiness Rollup Live</div>
                <div class="status-pill">Region Drill Down Enabled</div>
              </div>
            </div>

            <div class="actions">
              <select id="viewSelector" class="view-select" aria-label="View selector">
                <option value="vp" selected>Enterprise View</option>
                <option value="rm">Region View</option>
                <option value="dm">District View</option>
                <option value="sm">Store View</option>
              </select>

              <button class="btnx secondary" id="logoutBtn" type="button">Logout</button>
            </div>
          </div>

          <div class="hr"></div>

          <div id="commercialVpRoot"></div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="assets/commercial-vp.js?v=9"></script>
</body>
</html>
